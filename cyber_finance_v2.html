<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberClaw Finance | Pro Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-color: #05050a;
            --card-bg: #11111f;
            --accent-color: #00f2ff;
            --text-color: #e0e0ff;
            --up-color: #ff3e3e; 
            --down-color: #00ff88; 
            --border-glow: 0 0 10px rgba(0, 242, 255, 0.3);
            --secondary-text: #a0a0c0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--accent-color);
            text-shadow: 0 0 20px var(--accent-color);
            margin-bottom: 10px;
            text-align: center;
        }

        .status-bar {
            font-size: 0.9rem;
            margin-bottom: 30px;
            opacity: 0.7;
            text-align: center;
        }

        .filter-bar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            background: var(--card-bg);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            padding: 10px 15px;
            color: var(--text-color);
            flex: 1;
            min-width: 250px;
            outline: none;
            font-size: 1rem;
        }

        .filter-box {
            background: var(--card-bg);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-color);
            cursor: pointer;
            outline: none;
        }

        .category-section {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
        }

        .category-title {
            font-size: 1.5rem;
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 2px 10px rgba(0, 242, 255, 0.2);
        }

        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .stock-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            box-shadow: var(--border-glow);
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stock-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .stock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-color);
            opacity: 0.5;
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .stock-name {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .stock-symbol {
            font-size: 0.8rem;
            color: var(--secondary-text);
            font-family: monospace;
            background: rgba(0, 242, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .stock-price-area {
            margin: 15px 0;
        }

        .stock-price {
            font-size: 2.4rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .stock-change {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .up { color: var(--up-color); }
        .down { color: var(--down-color); }

        .update-time {
            font-size: 0.7rem;
            text-align: right;
            opacity: 0.4;
            font-family: monospace;
            margin-top: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--secondary-text);
            font-style: italic;
        }

        .discovery-hint {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            margin-top: -20px;
            margin-bottom: 30px;
            font-size: 0.9rem;
            color: var(--accent-color);
            opacity: 0.8;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        #chart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        #chart-container {
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 1100px;
            max-height: 90vh;
            position: relative;
            box-shadow: 0 0 40px var(--accent-color);
            overflow-y: auto;
            box-sizing: border-box;
        }

        #chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: sticky;
            top: -25px; /* Offset by container padding */
            background: var(--card-bg);
            z-index: 10;
            padding-top: 25px;
            padding-bottom: 10px;
        }
        .tab-nav {
            display: flex;
            gap: 10px;
            margin-left: 20px;
        }
        .tab-btn {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--text-color);
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
        }
        #options-container {
            display: none;
            width: 100%;
            overflow-x: auto;
        }
        .options-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .expiry-select {
            background: var(--card-bg);
            border: 1px solid var(--accent-color);
            color: var(--text-color);
            padding: 5px;
            border-radius: 4px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .option-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            text-align: right;
        }
        .option-table th {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding: 8px;
            text-align: center;
        }
        .option-table td {
            padding: 6px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-family: monospace;
        }
        .option-table td:first-child {
            text-align: center;
            font-weight: bold;
            color: var(--text-color);
        }
        .call-header { color: #ff3e3e !important; }
        .put-header { color: #00ff88 !important; }


        #chart-title {
            font-size: 1.5rem;
            color: var(--accent-color);
            font-weight: bold;
            word-wrap: break-word;
            max-width: 80%;
        }

        #close-chart {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        #close-chart:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .modal-content-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
        }

        .chart-main-area {
            flex: 1;
            min-width: 300px;
        }

        .components-panel {
            width: 280px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
        }
        .panel-title {
            font-size: 0.9rem;
            color: var(--accent-color);
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 5px;
            font-weight: bold;
        }
        .component-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--secondary-text);
        }
        .component-item span:last-child {
            color: var(--accent-color);
            font-family: monospace;
            font-weight: bold;
        }
        #chart-canvas {
            width: 100%;
            height: 600px;
        }

        .loading {
            font-style: italic;
            color: var(--accent-color);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <h1>CyberClaw Finance Pro</h1>
    <div class="status-bar">System Status: <span id="connection" class="loading">Syncing with Global Markets...</span></div>

    <div class="filter-bar">
        <input type="text" id="search-input" class="search-box" placeholder="Search ticker or name (e.g. 0050, 2395 or 台積電)...">
        <select id="category-filter" class="filter-box">
            <option value="all">All Categories</option>
            <!-- Categories injected here -->
        </select>
    </div>

    <div id="discovery-hint" class="discovery-hint">✨ Showing Featured Stocks. Search above to discover more...</div>

    <div id="main-container">
        <!-- Category sections injected here -->
    </div>

    <div id="chart-modal">
        <div id="chart-container">
            <div id="chart-header">
                <div style="display: flex; align-items: center;">
                    <div id="chart-title">Loading Chart...</div>
                    <div class="tab-nav">
                        <button class="tab-btn active" onclick="switchTab('chart')">K-Line</button>
                        <button class="tab-btn" onclick="switchTab('options')">Options</button>
                    </div>
                </div>
                <button id="close-chart">Close ✕</button>
            </div>
            <div class="modal-content-wrapper">
                <div id="chart-area" class="chart-main-area">
                    <div id="chart-canvas"></div>
                </div>
                <div id="options-container">
                    <div class="options-controls">
                        <div class="panel-title">Option Chain Analysis</div>
                        <select id="expiry-select" class="expiry-select" onchange="loadOptionsData()"></select>
                    </div>
                    <div class="options-grid">
                        <div>
                            <div class="panel-title call-header">CALLS</div>
                            <table class="option-table" id="calls-table">
                                <thead>
                                    <tr><th>Strike</th><th>Last</th><th>Bid</th><th>Ask</th><th>IV</th><th>Vol</th><th>OI</th></tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div>
                            <div class="panel-title put-header">PUTS</div>
                            <table class="option-table" id="puts-table">
                                <thead>
                                    <tr><th>Strike</th><th>Last</th><th>Bid</th><th>Ask</th><th>IV</th><th>Vol</th><th>OI</th></tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div id="chart-components" class="components-panel" style="display: none;">
                    <div class="panel-title">Top Components</div>
                    <div id="components-list"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let myChart = null;
        let allStocksData = {};
        let searchTimeout = null;

        async function updateStocks() {
            try {
                const response = await fetch('/api/stocks');
                const data = await response.json();
                
                // Merge featured stocks into allStocksData while preserving dynamic additions in each category
                for (const [cat, stocks] of Object.entries(data)) {
                    if (!allStocksData[cat]) allStocksData[cat] = {};
                    
                    // Start with the new featured stock data (to get latest prices)
                    const mergedStocks = { ...stocks };
                    
                    // Preserve stocks that were added dynamically and are not part of the featured list
                    for (const [name, info] of Object.entries(allStocksData[cat])) {
                        if (!stocks[name]) {
                            mergedStocks[name] = info;
                        }
                    }
                    allStocksData[cat] = mergedStocks;
                }
                
                const connStatus = document.getElementById('connection');
                const categoryFilter = document.getElementById('category-filter');
                
                connStatus.textContent = 'Live Connection Established';
                connStatus.classList.remove('loading');
                connStatus.style.color = 'var(--up-color)';

                const currentFilter = categoryFilter.value;
                categoryFilter.innerHTML = '<option value="all">All Categories</option>';
                for (const cat of Object.keys(data)) {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    categoryFilter.appendChild(option);
                }
                // Add "Discovered" to the filter if it exists
                if (allStocksData["Discovered"] && Object.keys(allStocksData["Discovered"]).length > 0) {
                    const option = document.createElement('option');
                    option.value = 'Discovered';
                    option.textContent = 'Discovered';
                    categoryFilter.appendChild(option);
                }
                categoryFilter.value = currentFilter;

                renderDashboard();
            } catch (e) {
                console.error('Fetch error:', e);
                document.getElementById('connection').textContent = 'Connection Lost. Retrying...';
                document.getElementById('connection').classList.add('loading');
            }
        }

        async function handleSearch(term) {
            const searchTerm = term.toLowerCase().trim();
            if (!searchTerm) {
                renderDashboard();
                return;
            }

            // First, try to find in local cache
            let found = false;
            for (const [cat, stocks] of Object.entries(allStocksData)) {
                for (const [name, info] of Object.entries(stocks)) {
                    if (name.toLowerCase().includes(searchTerm) || info.symbol.toLowerCase().includes(searchTerm)) {
                        found = true;
                        break;
                    }
                }
                if (found) break;
            }

            if (found) {
                renderDashboard();
            } else {
                // NOT FOUND locally -> Try the Dynamic API
                const mainContainer = document.getElementById('main-container');
                mainContainer.innerHTML = `<div class="empty-state">Searching global markets for "${searchTerm}"...</div>`;
                
                try {
                    const response = await fetch(`/api/search?q=${encodeURIComponent(searchTerm)}`);
                    if (response.status === 200) {
                        const newData = await response.json();
                        if (Object.keys(newData).length > 0) {
                            const [name, info] = Object.entries(newData)[0];
                            
                            // Determine the correct category for the discovered stock
                            let targetCat = "Discovered";
                            if (info.symbol.endsWith('.TW')) {
                                targetCat = "台股";
                            } else if (info.symbol.length <= 5 && !info.symbol.includes('.')) {
                                targetCat = "美股";
                            }

                            if (!allStocksData[targetCat]) {
                                allStocksData[targetCat] = {};
                            }
                            allStocksData[targetCat][name] = info;
                            renderDashboard();
                        } else {
                            mainContainer.innerHTML = `<div class="empty-state">No stock found for "${searchTerm}".</div>`;
                        }
                    } else {
                        mainContainer.innerHTML = `<div class="empty-state">Stock "${searchTerm}" not found in global markets.</div>`;
                    }
                } catch (e) {
                    mainContainer.innerHTML = `<div class="empty-state">Error searching for "${searchTerm}". Please try again.</div>`;
                }
            }
        }

        function renderDashboard() {
            const mainContainer = document.getElementById('main-container');
            const hint = document.getElementById('discovery-hint');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const selectedCat = document.getElementById('category-filter').value;
            
            mainContainer.innerHTML = '';
            hint.style.display = searchTerm === '' ? 'block' : 'none';

            for (const [cat, stocks] of Object.entries(allStocksData)) {
                if (selectedCat !== 'all' && selectedCat !== cat) continue;

                let stockEntries = Object.entries(stocks);
                
                if (searchTerm === '') {
                    stockEntries = stockEntries.slice(0, 6);
                } else {
                    stockEntries = stockEntries.filter(([name, info]) => {
                        return name.toLowerCase().includes(searchTerm) || info.symbol.toLowerCase().includes(searchTerm);
                    });
                }

                if (stockEntries.length === 0) continue;

                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `<div class="category-title">${cat} ${searchTerm === '' ? '(Featured)' : ''}</div><div class="stock-grid" id="grid-${cat}"></div>`;
                mainContainer.appendChild(section);

                const grid = section.querySelector('.stock-grid');
                
                for (const [name, info] of stockEntries) {
                    const card = document.createElement('div');
                    card.className = 'stock-card';
                    card.onclick = () => showChart(info.symbol, name);

                    const isUp = info.change >= 0;
                    const changeClass = isUp ? 'up' : 'down';
                    const arrow = isUp ? '▲' : '▼';

                    card.innerHTML = `
                        <div class="stock-header">
                            <div class="stock-name">${name}</div>
                            <div class="stock-symbol">${info.symbol}</div>
                        </div>
                        <div class="stock-price-area">
                            <div class="stock-price">
                                ${info.currency} ${info.price.toLocaleString()}
                            </div>
                            <div class="stock-change ${changeClass}">
                                ${arrow} ${Math.abs(info.change).toLocaleString()} (${info.pct_change}%)
                            </div>
                        </div>
                        <div class="update-time">Last Update: ${info.last_updated}</div>
                    `;
                    grid.appendChild(card);
                }
            }
            
            if (mainContainer.innerHTML === '') {
                mainContainer.innerHTML = `<div class="empty-state">No stocks found matching "${searchTerm}". Try another keyword!</div>`;
            }
        }

        function switchTab(tab) {
            const chartArea = document.getElementById('chart-area');
            const optionsArea = document.getElementById('options-container');
            const compPanel = document.getElementById('chart-components');
            const btns = document.querySelectorAll('.tab-btn');
            
            btns.forEach(btn => btn.classList.remove('active'));
            
            if (tab === 'chart') {
                chartArea.style.display = 'block';
                optionsArea.style.display = 'none';
                compPanel.style.display = currentSymbol.startsWith('00') ? 'block' : 'none';
                btns[0].classList.add('active');
            } else {
                chartArea.style.display = 'none';
                optionsArea.style.display = 'block';
                compPanel.style.display = 'none';
                btns[1].classList.add('active');
                loadOptionsData();
            }
        }

        let currentSymbol = '';

        async function loadOptionsData() {
            const expirySelect = document.getElementById('expiry-select');
            const callsBody = document.querySelector('#calls-table tbody');
            const putsBody = document.querySelector('#puts-table tbody');
            const currentExpiry = expirySelect.value;

            try {
                const url = currentExpiry 
                    ? `/api/options/${encodeURIComponent(currentSymbol)}/${encodeURIComponent(currentExpiry)}`
                    : `/api/options/${encodeURIComponent(currentSymbol)}`;
                
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                // Update expiry dropdown if it's the first load
                if (expirySelect.options.length === 0 && data.expirations) {
                    expirySelect.innerHTML = data.expirations.map(date => 
                        `<option value="${date}" ${date === data.current_expiry ? 'selected' : ''}>${date}</option>`
                    ).join('');
                }

                const renderRow = (row) => {
                    const itmClass = row.itm ? 'style="background: rgba(0, 242, 255, 0.1);"' : '';
                    return `
                        <tr ${itmClass}>
                            <td>${row.strike}</td>
                            <td>${row.lastPrice || '-'}</td>
                            <td>${row.bid || '-'}</td>
                            <td>${row.ask || '-'}</td>
                            <td>${row.iv ? (row.iv * 100).toFixed(2) + '%' : '-'}</td>
                            <td>${row.volume || 0}</td>
                            <td>${row.openInterest || 0}</td>
                        </tr>
                    `;
                };

                callsBody.innerHTML = data.calls.map(renderRow).join('');
                putsBody.innerHTML = data.puts.map(renderRow).join('');
                
            } catch (e) {
                console.error('Options fetch failed:', e);
                callsBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red;">No options data available</td></tr>`;
                putsBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red;">No options data available</td></tr>`;
            }
        }

        async function showChart(symbol, name) {
            currentSymbol = symbol;
            const modal = document.getElementById('chart-modal');
            const title = document.getElementById('chart-title');
            const canvas = document.getElementById('chart-canvas');
            const compPanel = document.getElementById('chart-components');
            const compList = document.getElementById('components-list');
            const expirySelect = document.getElementById('expiry-select');
            
            // Reset options dropdown
            expirySelect.innerHTML = '';
            
            // 1. Immediate Cleanup: Dispose old chart immediately to prevent "ghost charts"

            if (myChart) {
                myChart.dispose();
                myChart = null;
            }
            
            modal.style.display = 'flex';
            title.textContent = `Loading ${name}...`;
            compPanel.style.display = 'none';
            
            // 2. ETF Component Logic (Async & Non-Blocking)
            if (symbol.startsWith('00')) {
                (async () => {
                    try {
                        const compResponse = await fetch(`/api/components/${encodeURIComponent(symbol)}`);
                        if (!compResponse.ok) throw new Error(`Server error: ${compResponse.status}`);
                        const components = await compResponse.json();
                        
                        if (Array.isArray(components) && components.length > 0) {
                            compPanel.style.display = 'block';
                            compList.innerHTML = components.map(c => 
                                `<div class="component-item"><span>${c.name}</span><span>${c.weight}%</span></div>`
                            ).join('');
                        }
                    } catch (e) {
                        console.error('Component fetch failed:', e);
                    }
                })();
            }
            
            try {
                // 3. History Fetch with URI encoding
                const response = await fetch(`/api/history/${encodeURIComponent(symbol)}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}: Failed to fetch history`);
                
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                // Keep full history, but calculate the start percentage for the last 63 trading days (approx 3 months)
                const totalBars = data.length;
                const startPercent = totalBars > 63 ? ((totalBars - 63) / totalBars) * 100 : 0;

                // --- MA Calculation Logic ---
                const closes = data.map(item => item.close);
                const calculateMA = (period) => {
                    let result = [];
                    for (let i = 0; i < closes.length; i++) {
                        if (i < period - 1) {
                            result.push(null);
                        } else {
                            const slice = closes.slice(i - period + 1, i + 1);
                            const sum = slice.reduce((a, b) => a + b, 0);
                            result.push(parseFloat((sum / period).toFixed(2)));
                        }
                    }
                    return result;
                };

                const ma5 = calculateMA(5);
                const ma10 = calculateMA(10);
                const ma20 = calculateMA(20);
                const ma60 = calculateMA(60);
                const ma120 = calculateMA(120);

                // --- Volume Calculation ---
                const volumes = data.map(item => item.volume);
                const volumeColors = data.map(item => (item.close >= item.open ? '#ff3e3e' : '#00ff88'));
                // ---------------------------

                title.textContent = `${name} (${symbol}) - History Analysis`;
                myChart = echarts.init(canvas);

                const dates = data.map(item => new Date(item.time * 1000).toLocaleDateString());
                const values = data.map(item => [item.open, item.close, item.low, item.high]);

                const option = {
                    backgroundColor: 'transparent',
                    legend: {
                        data: ['K-Line', 'MA5', 'MA10', 'MA20', 'MA60', 'MA120', 'Volume'],
                        textStyle: { color: '#888', fontSize: 11 },
                        top: '2%',
                        right: 'center',
                        padding: [0, 0, 0, 0],
                        itemWidth: 10,
                        itemHeight: 10,
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: { type: 'cross', lineStyle: { color: 'rgba(0, 242, 255, 0.5)', width: 1, type: 'dashed' } },
                        backgroundColor: 'rgba(15, 15, 30, 0.9)',
                        borderColor: '#00f2ff',
                        textStyle: { color: '#e0e0ff' }
                    },
                    grid: {
                        left: '5%',
                        right: '5%',
                        bottom: '10%',
                        top: '12%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: dates,
                        axisLine: { lineStyle: { color: '#333' } },
                        axisLabel: { color: '#666', fontSize: 10 },
                        splitLine: { show: false }
                    },
                    yAxis: [
                        {
                            scale: true,
                            axisLine: { show: false },
                            axisTick: { show: false },
                            axisLabel: { color: '#666', fontSize: 10 },
                            splitLine: { lineStyle: { color: '#1a1a2a' } }
                        },
                        {
                            scale: true,
                            axisLine: { show: false },
                            axisTick: { show: false },
                            axisLabel: { show: false },
                            splitLine: { show: false },
                            gridIndex: 0
                        }
                    ],
                    dataZoom: [
                        { type: 'inside', start: startPercent, end: 100 },
                        { type: 'slider', start: startPercent, end: 100, handleStyle: { color: '#00f2ff' }, textStyle: { color: '#666' }, borderColor: '#222', fillerColor: 'rgba(0, 242, 255, 0.05)' }
                    ],
                    series: [
                        {
                            name: 'K-Line',
                            type: 'candlestick',
                            data: values,
                            itemStyle: {
                                color: '#ff4d4d',
                                color0: '#00ffaa',
                                borderColor: '#ff4d4d',
                                borderColor0: '#00ffaa'
                            }
                        },
                        { name: 'MA5', type: 'line', data: ma5, smooth: true, showSymbol: false, itemStyle: { color: '#F6E05E' }, lineStyle: { width: 1.5, color: '#F6E05E' } },
                        { name: 'MA10', type: 'line', data: ma10, smooth: true, showSymbol: false, itemStyle: { color: '#F6AD55' }, lineStyle: { width: 1.5, color: '#F6AD55' } },
                        { name: 'MA20', type: 'line', data: ma20, smooth: true, showSymbol: false, itemStyle: { color: '#FC8181' }, lineStyle: { width: 1.5, color: '#FC8181' } },
                        { name: 'MA60', type: 'line', data: ma60, smooth: true, showSymbol: false, itemStyle: { color: '#68D391' }, lineStyle: { width: 1.5, color: '#68D391' } },
                        { name: 'MA120', type: 'line', data: ma120, smooth: true, showSymbol: false, itemStyle: { color: '#63B3ED' }, lineStyle: { width: 1.5, color: '#63B3ED' } },
                        {
                            name: 'Volume',
                            type: 'bar',
                            yAxisIndex: 1,
                            data: volumes,
                            itemStyle: {
                                color: (params) => volumeColors[params.dataIndex],
                                opacity: 0.3 // Ghost Volume
                            },
                            barWidth: '60%',
                        },
                        {
                            name: 'Vol Trend',
                            type: 'line',
                            yAxisIndex: 1,
                            data: volumes,
                            smooth: true,
                            showSymbol: false,
                            lineStyle: { width: 1, color: 'rgba(170, 170, 192, 0.3)' },
                            itemStyle: { color: 'rgba(170, 170, 192, 0.3)' }
                        }
                    ]
                };

                myChart.setOption(option);

                window.addEventListener('resize', () => {
                    if (myChart) myChart.resize();
                });

            } catch (e) {
                title.textContent = 'Error: ' + e.message;
            }
        }

        document.getElementById('close-chart').onclick = () => {
            document.getElementById('chart-modal').style.display = 'none';
        };

        document.getElementById('search-input').oninput = (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => handleSearch(e.target.value), 300);
        };
        document.getElementById('category-filter').onchange = renderDashboard;

        setInterval(updateStocks, 5000);
        updateStocks();
    </script>
</body>
</html>
